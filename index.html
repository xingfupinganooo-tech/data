<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Pump.fun 专业监控 · 代币热点</title>
    <!-- 字体与图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- ECharts 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b0e14 0%, #1a1f2b 100%);
            min-height: 100vh;
            padding: 24px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 头部样式 */
        .header {
            background: rgba(26, 32, 44, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 28px 32px;
            margin-bottom: 28px;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .title-section h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(120deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-section h1 i {
            background: rgba(251, 191, 36, 0.2);
            padding: 10px;
            border-radius: 18px;
            font-size: 24px;
            -webkit-text-fill-color: #fbbf24;
        }

        .badge {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge i {
            margin-right: 6px;
            font-size: 12px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin: 20px 0 0;
        }

        .stat-item {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            padding: 18px 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }

        .stat-item:hover {
            border-color: rgba(251, 191, 36, 0.3);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }

        .stat-unit {
            font-size: 14px;
            color: #64748b;
            margin-left: 4px;
        }

        .stat-trend {
            font-size: 13px;
            margin-top: 8px;
            color: #34d399;
        }

        /* 图表行 */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 28px;
        }

        .chart-card {
            background: rgba(26, 32, 44, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            height: 340px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 8px;
        }

        .chart-header h3 {
            font-size: 16px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .chart-header span {
            font-size: 13px;
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 30px;
            color: #94a3b8;
        }

        /* 控制栏 */
        .control-bar {
            background: rgba(26, 32, 44, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 60px;
            padding: 8px 8px 8px 24px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            flex: 2;
        }

        .filter-group input {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            font-size: 15px;
            width: 260px;
            outline: none;
            transition: all 0.2s;
        }

        .filter-group input:focus {
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
        }

        .filter-group select {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 12px 24px;
            color: white;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .view-options {
            display: flex;
            gap: 6px;
            background: #1a1f2b;
            padding: 4px;
            border-radius: 40px;
            border: 1px solid #2d3748;
        }

        .view-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: #fbbf24;
            color: #0f172a;
            font-weight: 500;
        }

        .view-btn i {
            margin-right: 6px;
        }

        .refresh-btn {
            background: #fbbf24;
            border: none;
            color: #0f172a;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: #f59e0b;
            transform: scale(1.02);
        }

        /* 表格卡片 */
        .table-card {
            background: rgba(26, 32, 44, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px 0 0 0;
            overflow: hidden;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px 16px 24px;
        }

        .table-header h2 {
            font-size: 18px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .table-header h2 i {
            color: #fbbf24;
            margin-right: 10px;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pagination button {
            background: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination button:hover {
            background: #fbbf24;
            color: #0f172a;
            border-color: #fbbf24;
        }

        .pagination span {
            color: #94a3b8;
            font-size: 14px;
        }

        .table-container {
            overflow-x: auto;
            padding: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            text-align: left;
            padding: 16px 24px;
            background: #1a1f2b;
            color: #94a3b8;
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3748;
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid #253041;
            color: #e2e8f0;
            font-size: 14px;
        }

        tr:hover td {
            background: rgba(51, 65, 85, 0.3);
        }

        .token-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .token-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
            font-weight: bold;
            font-size: 14px;
        }

        .token-info {
            display: flex;
            flex-direction: column;
        }

        .token-name {
            font-weight: 600;
            color: white;
        }

        .token-symbol {
            font-size: 12px;
            color: #94a3b8;
        }

        .price-up {
            color: #34d399;
            font-weight: 500;
        }

        .price-down {
            color: #f87171;
            font-weight: 500;
        }

        .contract-badge {
            background: #1e293b;
            padding: 6px 12px;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
            border: 1px solid #334155;
        }

        .contract-badge:hover {
            background: #fbbf24;
            color: #0f172a;
            border-color: #fbbf24;
        }

        .badge-new {
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }

        .badge-hot {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: #64748b;
            font-size: 13px;
            padding: 20px;
            border-top: 1px solid #253041;
        }

        .footer i {
            color: #fbbf24;
            margin: 0 4px;
        }

        /* 加载动画 */
        .loading-skeleton {
            padding: 40px;
            text-align: center;
            color: #64748b;
        }

        .loading-skeleton i {
            font-size: 30px;
            color: #fbbf24;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .header { padding: 20px; }
            .stats-row { grid-template-columns: 1fr; }
            .control-bar { flex-direction: column; align-items: stretch; }
            .filter-group { flex-direction: column; }
            .filter-group input { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-top">
                <div class="title-section">
                    <h1>
                        <i class="fas fa-bolt"></i> 
                        Pump.fun 热点雷达
                        <span class="badge"><i class="fas fa-circle"></i> 实时监控</span>
                    </h1>
                </div>
                <div class="header-right">
                    <span class="badge"><i class="far fa-clock"></i> <span id="updateTime">加载中...</span></span>
                </div>
            </div>
            <!-- 统计卡片 -->
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-database"></i> 今日热点</div>
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-trend"><i class="fas fa-arrow-up"></i> +2 新币/小时</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-chart-line"></i> 最高24h交易</div>
                    <div class="stat-value" id="maxTx">0</div>
                    <div class="stat-unit">笔</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-water"></i> 最高流动性</div>
                    <div class="stat-value" id="maxLiq">$0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-rocket"></i> 待监控代币</div>
                    <div class="stat-value" id="pendingCount">0</div>
                </div>
            </div>
        </div>

        <!-- 图表行 -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-header">
                    <h3><i class="fas fa-chart-bar" style="color: #fbbf24; margin-right: 8px;"></i>24h 交易笔数 TOP 10</h3>
                    <span>最近24小时</span>
                </div>
                <div id="txChart" style="width: 100%; height: 260px;"></div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <h3><i class="fas fa-pie-chart" style="color: #fbbf24; margin-right: 8px;"></i>流动性分布 TOP 6</h3>
                    <span>按代币</span>
                </div>
                <div id="liquidityChart" style="width: 100%; height: 260px;"></div>
            </div>
        </div>

        <!-- 控制栏 -->
        <div class="control-bar">
            <div class="filter-group">
                <i class="fas fa-search" style="color: #64748b;"></i>
                <input type="text" id="searchInput" placeholder="搜索代币名称或合约...">
                <select id="sortSelect">
                    <option value="time">按发布时间</option>
                    <option value="tx">按交易数</option>
                    <option value="liquidity">按流动性</option>
                </select>
            </div>
            <div class="view-options">
                <button class="view-btn active" onclick="setView('grid')"><i class="fas fa-table"></i> 表格</button>
                <button class="view-btn" onclick="setView('card')"><i class="fas fa-th-large"></i> 卡片</button>
            </div>
            <button class="refresh-btn" onclick="refreshData()"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>

        <!-- 表格卡片 -->
        <div class="table-card">
            <div class="table-header">
                <h2><i class="fas fa-fire"></i> 最新热点列表 · 实时更新</h2>
                <div class="pagination">
                    <button onclick="changePage(-1)"><i class="fas fa-chevron-left"></i></button>
                    <span id="pageInfo">1 / 1</span>
                    <button onclick="changePage(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="table-container">
                <table id="tokenTable">
                    <thead>
                        <tr>
                            <th>代币</th>
                            <th>发布时间</th>
                            <th>价格</th>
                            <th>流动性</th>
                            <th>24h交易</th>
                            <th>热度</th>
                            <th>合约地址</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="loading-skeleton"><i class="fas fa-spinner"></i><br>加载数据中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            <i class="fas fa-bolt"></i> 数据自动同步 · 点击合约地址直接复制 · 每60秒自动刷新
        </div>
    </div>

    <script>
        // 全局变量
        let allTokens = [];
        let currentPage = 1;
        const pageSize = 10;
        let currentView = 'grid';

        // 复制合约
        function copyContract(address) {
            navigator.clipboard.writeText(address).then(() => {
                alert('✅ 合约地址已复制');
            }).catch(() => {
                prompt('手动复制地址:', address);
            });
        }

        // 格式化数字
        function formatNumber(num) {
            if (!num && num !== 0) return '0';
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toString();
        }

        // 格式化价格
        function formatPrice(price) {
            if (!price || price === 'N/A') return 'N/A';
            const p = parseFloat(price);
            if (p < 0.000001) return p.toExponential(2);
            if (p < 0.001) return p.toFixed(8);
            if (p < 1) return p.toFixed(6);
            return p.toFixed(4);
        }

        // 计算热度分数（简单算法）
        function calculateHotScore(token) {
            return (token.tx_count || 0) * 0.7 + (token.liquidity || 0) * 0.0001;
        }

        // 获取热度标签
        function getHotBadge(score) {
            if (score > 1000) return '<span class="badge-hot">🔥 火热</span>';
            if (score > 100) return '<span class="badge-new">📈 关注</span>';
            return '';
        }

        // 判断价格涨跌（这里简单随机，实际可根据历史数据）
        function getPriceClass(price) {
            return Math.random() > 0.5 ? 'price-up' : 'price-down';
        }

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('hot_tokens.json?' + Date.now());
                if (!response.ok) throw new Error('加载失败');
                allTokens = await response.json();
                
                if (!allTokens || allTokens.length === 0) {
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="loading-skeleton"><i class="fas fa-database"></i><br>暂无数据</td></tr>';
                    return;
                }

                // 为每个代币添加热度分数
                allTokens = allTokens.map(t => ({...t, hotScore: calculateHotScore(t)}));

                // 更新统计卡片
                updateStats();

                // 更新时间
                document.getElementById('updateTime').innerHTML = new Date().toLocaleString('zh-CN');

                // 渲染表格
                renderTable();

                // 渲染图表
                renderCharts();

            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="loading-skeleton"><i class="fas fa-exclamation-triangle" style="color:#f87171;"></i><br>加载失败，请刷新重试</td></tr>';
            }
        }

        // 更新统计卡片
        function updateStats() {
            document.getElementById('totalCount').innerText = allTokens.length;
            
            const maxTx = Math.max(...allTokens.map(d => d.tx_count || 0));
            document.getElementById('maxTx').innerText = formatNumber(maxTx);
            
            const maxLiq = Math.max(...allTokens.map(d => d.liquidity || 0));
            document.getElementById('maxLiq').innerText = '$' + formatNumber(maxLiq);
            
            document.getElementById('pendingCount').innerText = allTokens.filter(t => (t.tx_count || 0) < 10).length;
        }

        // 渲染表格
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;
            
            // 过滤
            let filtered = allTokens.filter(t => 
                (t.name?.toLowerCase().includes(searchTerm) || 
                 t.symbol?.toLowerCase().includes(searchTerm) ||
                 t.contract?.toLowerCase().includes(searchTerm))
            );
            
            // 排序
            if (sortBy === 'time') {
                // 按时间倒序（假设time字段包含时间信息）
                filtered.sort((a, b) => (b.created || 0) - (a.created || 0));
            } else if (sortBy === 'tx') {
                filtered.sort((a, b) => (b.tx_count || 0) - (a.tx_count || 0));
            } else if (sortBy === 'liquidity') {
                filtered.sort((a, b) => (b.liquidity || 0) - (a.liquidity || 0));
            }
            
            // 分页
            const totalPages = Math.ceil(filtered.length / pageSize) || 1;
            currentPage = Math.min(currentPage, totalPages);
            const start = (currentPage - 1) * pageSize;
            const pageData = filtered.slice(start, start + pageSize);
            
            document.getElementById('pageInfo').innerText = `${currentPage} / ${totalPages}`;
            
            if (pageData.length === 0) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="loading-skeleton"><i class="fas fa-search"></i><br>没有匹配的代币</td></tr>';
                return;
            }
            
            let html = '';
            pageData.forEach(t => {
                const hotScore = t.hotScore || calculateHotScore(t);
                const priceClass = getPriceClass(t.price);
                const badge = getHotBadge(hotScore);
                
                html += `<tr>
                    <td>
                        <div class="token-cell">
                            <div class="token-icon">${(t.symbol || '??').slice(0,2).toUpperCase()}</div>
                            <div class="token-info">
                                <span class="token-name">${t.name || '未知'}</span>
                                <span class="token-symbol">${t.symbol || '未知'}</span>
                            </div>
                        </div>
                    </td>
                    <td>${t.time || '未知'}</td>
                    <td class="${priceClass}">$${formatPrice(t.price)}</td>
                    <td>$${formatNumber(t.liquidity || 0)}</td>
                    <td>${formatNumber(t.tx_count || 0)}</td>
                    <td>${badge}</td>
                    <td><span class="contract-badge" onclick="copyContract('${t.contract || ''}')">${(t.contract || '').slice(0,8)}...${(t.contract || '').slice(-4)}</span></td>
                </tr>`;
            });
            
            document.getElementById('tableBody').innerHTML = html;
        }

        // 渲染图表
        function renderCharts() {
            // 交易笔数柱状图
            const txChart = echarts.init(document.getElementById('txChart'));
            const topTx = [...allTokens].sort((a,b) => (b.tx_count || 0) - (a.tx_count || 0)).slice(0, 10);
            
            txChart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '8%', right: '5%', bottom: '8%', top: '8%', containLabel: true },
                xAxis: { 
                    type: 'category', 
                    data: topTx.map(t => t.symbol || '未知'),
                    axisLabel: { color: '#94a3b8', rotate: 30, fontSize: 10 }
                },
                yAxis: { 
                    type: 'value', 
                    name: '交易笔数',
                    nameTextStyle: { color: '#94a3b8' },
                    axisLabel: { color: '#94a3b8' },
                    splitLine: { lineStyle: { color: '#253041' } }
                },
                series: [{
                    name: '交易数',
                    type: 'bar',
                    data: topTx.map(t => t.tx_count || 0),
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#fbbf24' },
                            { offset: 1, color: '#f59e0b' }
                        ]),
                        borderRadius: [6,6,0,0]
                    },
                    barWidth: 20
                }]
            });

            // 流动性饼图
            const liqChart = echarts.init(document.getElementById('liquidityChart'));
            const topLiq = [...allTokens].sort((a,b) => (b.liquidity || 0) - (a.liquidity || 0)).slice(0, 6);
            
            liqChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: ${c} ({d}%)' },
                series: [{
                    name: '流动性分布',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '50%'],
                    data: topLiq.map(t => ({ name: t.symbol || '未知', value: t.liquidity || 0 })),
                    label: { color: '#e2e8f0', fontSize: 11 },
                    itemStyle: {
                        borderRadius: 8,
                        borderColor: '#1a1f2b',
                        borderWidth: 2
                    },
                    color: ['#fbbf24', '#f59e0b', '#f97316', '#f87171', '#60a5fa', '#34d399']
                }]
            });
        }

        // 搜索防抖
        let searchTimer;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                currentPage = 1;
                renderTable();
            }, 300);
        });

        document.getElementById('sortSelect').addEventListener('change', () => {
            currentPage = 1;
            renderTable();
        });

        function changePage(delta) {
            const totalPages = Math.ceil(allTokens.length / pageSize) || 1;
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderTable();
            }
        }

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            // 这里可以切换表格/卡片视图，当前仅表格已实现
        }

        function refreshData() {
            loadData();
        }

        // 自动刷新
        document.addEventListener('DOMContentLoaded', loadData);
        setInterval(loadData, 60000);
    </script>
</body>
</html>
